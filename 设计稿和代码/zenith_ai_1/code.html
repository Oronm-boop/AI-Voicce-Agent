<style>
        body { background-color: #f8f9fa; }
        .wave-line {
            width: 2px;
            background-color: #374151;
            border-radius: 9999px;
            margin: 0 4px;
            animation: wave 1.2s ease-in-out infinite alternate;
        }
        @keyframes wave {
            0% { height: 10px; }
            100% { height: 60px; }
        }
        .wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px;
        }
        
        .wave-line:nth-child(1) { animation-delay: 0.0s; height: 15px; }
        .wave-line:nth-child(2) { animation-delay: 0.1s; height: 30px; }
        .wave-line:nth-child(3) { animation-delay: 0.2s; height: 45px; }
        .wave-line:nth-child(4) { animation-delay: 0.3s; height: 60px; }
        .wave-line:nth-child(5) { animation-delay: 0.4s; height: 40px; }
        .wave-line:nth-child(6) { animation-delay: 0.5s; height: 50px; }
        .wave-line:nth-child(7) { animation-delay: 0.6s; height: 35px; }
        .wave-line:nth-child(8) { animation-delay: 0.7s; height: 20px; }
        .wave-line:nth-child(9) { animation-delay: 0.8s; height: 45px; }
        .wave-line:nth-child(10) { animation-delay: 0.9s; height: 25px; }
    </style>
