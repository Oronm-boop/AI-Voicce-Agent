<script>
        // Micro-interaction for toggle switches
        const toggles = document.querySelectorAll('input[type="checkbox"]');
        toggles.forEach(toggle => {
            toggle.addEventListener('change', (e) => {
                const label = e.target.nextElementSibling;
                if(e.target.checked) {
                    e.target.classList.add('translate-x-6', 'border-primary');
                    e.target.classList.remove('translate-x-0', 'border-outline-variant');
                    label.classList.add('bg-primary');
                    label.classList.remove('bg-surface-container-high');
                } else {
                    e.target.classList.remove('translate-x-6', 'border-primary');
                    e.target.classList.add('translate-x-0', 'border-outline-variant');
                    label.classList.remove('bg-primary');
                    label.classList.add('bg-surface-container-high');
                }
            });
        });
    </script>
