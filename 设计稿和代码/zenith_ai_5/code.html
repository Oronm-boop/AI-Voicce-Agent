<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>登录 - Zenith AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&amp;family=Noto+Sans+SC:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface-variant": "#44474c",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#dbc3a2",
                        "secondary-fixed-dim": "#c0c7d6",
                        "on-background": "#191c1d",
                        "surface-container-low": "#f3f4f5",
                        "on-tertiary-container": "#c0a989",
                        "primary": "#212b3a",
                        "outline-variant": "#c5c6cc",
                        "secondary-fixed": "#dce2f3",
                        "inverse-primary": "#bdc7db",
                        "on-surface": "#191c1d",
                        "primary-container": "#374151",
                        "surface-container-highest": "#e1e3e4",
                        "surface": "#f8f9fa",
                        "outline": "#75777d",
                        "on-secondary-fixed-variant": "#404754",
                        "surface-tint": "#555f70",
                        "surface-container-high": "#e7e8e9",
                        "surface-bright": "#f8f9fa",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e1e3e4",
                        "secondary-container": "#dce2f3",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#edeeef",
                        "primary-fixed": "#d9e3f7",
                        "surface-dim": "#d9dadb",
                        "primary-fixed-dim": "#bdc7db",
                        "tertiary-container": "#4e3e25",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#5e6572",
                        "inverse-surface": "#2e3132",
                        "on-secondary-fixed": "#151c27",
                        "tertiary-fixed": "#f8dfbc",
                        "on-error": "#ffffff",
                        "tertiary": "#362811",
                        "error": "#ba1a1a",
                        "secondary": "#585f6c",
                        "on-tertiary-fixed-variant": "#55442b",
                        "on-tertiary-fixed": "#261905",
                        "on-primary-fixed-variant": "#3d4757",
                        "on-primary-fixed": "#121c2a",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "background": "#f8f9fa",
                        "on-primary-container": "#a3adc0"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "element-gap": "16px",
                        "container-padding": "32px",
                        "unit": "8px",
                        "stack-tight": "4px",
                        "gutter": "24px"
                    },
                    fontFamily: {
                        "title-sm": ["Noto Sans SC"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-md": ["Noto Sans SC"],
                        "body-lg": ["Noto Sans SC"],
                        "label-sm": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"]
                    },
                    fontSize: {
                        "title-sm": ["18px", { "lineHeight": "26px", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "500" }],
                        "body-md": ["14px", { "lineHeight": "22px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-container-padding font-body-md antialiased">
<!-- Login Container -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl border border-surface-variant p-10 shadow-[0px_10px_30px_rgba(0,0,0,0.04)] relative overflow-hidden">
<!-- Subtle Ambient Background Effect inside Card -->
<div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 bg-surface-container rounded-full blur-3xl opacity-50 pointer-events-none"></div>
<div class="relative z-10 flex flex-col items-center mb-8">
<!-- Brand Logo -->
<div class="mb-4">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">
                    explore
                </span>
</div>
<h1 class="font-display-lg text-display-lg text-primary mb-2 text-center">Zenith AI</h1>
<h2 class="font-headline-md text-headline-md text-on-surface-variant text-center">欢迎回来</h2>
</div>
<form class="relative z-10 space-y-6">
<!-- Username Input -->
<div class="space-y-stack-tight">
<label class="block font-body-md text-body-md text-on-surface-variant" for="username">用户名或邮箱</label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-0 placeholder:text-outline transition-colors" id="username" name="username" placeholder="输入您的用户名" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-stack-tight">
<label class="block font-body-md text-body-md text-on-surface-variant" for="password">密码</label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-0 placeholder:text-outline transition-colors" id="password" name="password" placeholder="输入您的密码" type="password"/>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between font-body-md text-body-md">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="rounded border-outline-variant text-primary focus:ring-primary w-4 h-4 bg-surface transition-colors cursor-pointer" type="checkbox"/>
<span class="text-on-surface-variant group-hover:text-primary transition-colors">记住我</span>
</label>
<a class="text-primary hover:text-primary-container transition-colors" href="#">忘记密码？</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary font-title-sm text-title-sm rounded-lg py-3 px-6 hover:bg-primary transition-colors flex items-center justify-center space-x-2" type="submit">
<span>登录</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative z-10 flex items-center py-6">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink-0 px-4 font-body-md text-body-md text-outline">或</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<!-- Third Party Login -->
<div class="relative z-10">
<button class="w-full bg-surface-container-lowest border border-outline-variant text-primary font-body-md text-body-md rounded-lg py-3 px-6 hover:bg-surface-container-low transition-colors flex items-center justify-center space-x-3">
<span class="material-symbols-outlined text-[20px]">language</span>
<span>使用企业 SSO 登录</span>
</button>
</div>
<div class="relative z-10 mt-8 text-center font-label-sm text-label-sm text-outline">
<p>还没有账号？ <a class="text-primary hover:underline" href="#">联系管理员</a></p>
</div>
</main>
<script>
        // Simple subtle interaction for inputs
        const inputs = document.querySelectorAll('input[type="text"], input[type="password"]');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.querySelector('label').classList.replace('text-on-surface-variant', 'text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.querySelector('label').classList.replace('text-primary', 'text-on-surface-variant');
            });
        });
    </script>
</body></html>
